<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CommentTree</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .comment { margin-left: 20px; border-left: 2px solid #ccc; padding-left: 10px; margin-top: 10px; }
        .meta { font-size: 0.8em; color: gray; }
        button { margin-right: 5px; }
        form { background: #f5f5f5; padding: 15px; border-radius: 5px; margin-top: 20px; }
        textarea { width: 100%; box-sizing: border-box; }
        .hidden { display: none; }
        .search-result { border-bottom: 1px solid #eee; padding: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>CommentTree</h1>
    <div>
        <input type="text" id="searchInput" placeholder="Поиск...">
        <button id="searchBtn">Найти</button>
    </div>
    <div id="commentsContainer" class="comments"></div>

    <form id="commentForm">
        <h3 id="formTitle">Новый комментарий</h3>
        <input type="hidden" id="parentId" value="0">
        <textarea id="commentText" rows="3" required></textarea><br>
        <button type="submit">Отправить</button>
        <button type="button" id="cancelReplyBtn" class="hidden">Отмена</button>
    </form>
</div>

<script>
    const API_BASE = '/comments';

    const commentsContainer = document.getElementById('commentsContainer');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const commentForm = document.getElementById('commentForm');
    const parentIdInput = document.getElementById('parentId');
    const commentText = document.getElementById('commentText');
    const formTitle = document.getElementById('formTitle');
    const cancelReplyBtn = document.getElementById('cancelReplyBtn');

    let currentParent = 0; // 0 - корневой

    // Вспомогательные функции
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatDate(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        return d.toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
    }

    function showError(msg) {
        alert('Ошибка: ' + msg);
    }

    // Загрузка корневых комментариев (деревьев)
    async function loadRootComments(page = 1, limit = 10) {
        try {
            const url = `${API_BASE}?page=${page}&limit=${limit}&sort=created_at DESC`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            console.log('Ответ сервера (корневые):', data); // для отладки
            if (!data.comments || !Array.isArray(data.comments)) {
                throw new Error('Неверный формат ответа: ожидается поле comments с массивом');
            }
            renderTree(data.comments);
        } catch (err) {
            showError('Не удалось загрузить комментарии: ' + err.message);
        }
    }

    // Рекурсивный рендеринг дерева
    function renderTree(nodes, level = 0) {
        if (!nodes || nodes.length === 0) return;
        nodes.forEach(node => {
            // Проверка структуры узла
            if (!node || !node.comment || typeof node.comment.id === 'undefined') {
                console.warn('Пропущен некорректный узел:', node);
                return;
            }
            renderNode(node, level);
            if (node.children && Array.isArray(node.children)) {
                renderTree(node.children, level + 1);
            }
        });
    }

    function renderNode(node, level) {
        const div = document.createElement('div');
        div.className = 'comment';
        div.dataset.id = node.comment.id;
        div.style.marginLeft = (level * 20) + 'px';

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `#${node.comment.id} · ${formatDate(node.comment.created_at)}`;

        const textDiv = document.createElement('div');
        textDiv.innerHTML = escapeHtml(node.comment.text);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const replyBtn = document.createElement('button');
        replyBtn.textContent = 'Ответить';
        replyBtn.onclick = () => setReplyParent(node.comment.id);

        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = 'Удалить';
        deleteBtn.onclick = () => deleteComment(node.comment.id);

        actions.appendChild(replyBtn);
        actions.appendChild(deleteBtn);

        div.appendChild(meta);
        div.appendChild(textDiv);
        div.appendChild(actions);
        commentsContainer.appendChild(div);
    }

    function setReplyParent(parentId) {
        currentParent = parentId;
        parentIdInput.value = parentId;
        formTitle.textContent = parentId === 0 ? 'Новый комментарий' : `Ответ к комментарию #${parentId}`;
        cancelReplyBtn.classList.remove('hidden');
        commentText.focus();
    }

    cancelReplyBtn.addEventListener('click', () => {
        currentParent = 0;
        parentIdInput.value = 0;
        formTitle.textContent = 'Новый комментарий';
        cancelReplyBtn.classList.add('hidden');
    });

    // Создание комментария
    commentForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = commentText.value.trim();
        if (!text) return;

        const payload = {
            parent_id: currentParent === 0 ? null : currentParent,
            text: text
        };

        try {
            const resp = await fetch(API_BASE, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            // Очистка формы
            commentText.value = '';
            setReplyParent(0);
            cancelReplyBtn.classList.add('hidden');
            // Перезагрузка списка
            await refreshComments();
        } catch (err) {
            showError('Не удалось создать комментарий: ' + err.message);
        }
    });

    // Удаление
    async function deleteComment(id) {
        if (!confirm('Удалить комментарий и все ответы?')) return;
        try {
            const resp = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            await refreshComments();
        } catch (err) {
            showError('Не удалось удалить: ' + err.message);
        }
    }

    // Поиск
    searchBtn.addEventListener('click', async () => {
        const q = searchInput.value.trim();
        if (!q) return;
        try {
            const resp = await fetch(`/comments/search?q=${encodeURIComponent(q)}&page=1&limit=50`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            console.log('Результаты поиска:', data);
            if (!data.comments || !Array.isArray(data.comments)) {
                throw new Error('Неверный формат ответа поиска');
            }
            displaySearchResults(data.comments);
        } catch (err) {
            showError('Ошибка поиска: ' + err.message);
        }
    });

    function displaySearchResults(comments) {
        commentsContainer.innerHTML = '';
        if (comments.length === 0) {
            commentsContainer.innerHTML = '<p>Ничего не найдено</p>';
            return;
        }
        const title = document.createElement('h3');
        title.textContent = 'Результаты поиска:';
        commentsContainer.appendChild(title);
        comments.forEach(c => {
            const div = document.createElement('div');
            div.className = 'search-result';
            div.innerHTML = `<span class="meta">#${c.id} (родитель: ${c.parent_id === null ? 'корневой' : '#'+c.parent_id}) · ${formatDate(c.created_at)}</span><br>${escapeHtml(c.text)}`;
            commentsContainer.appendChild(div);
        });
    }

    async function refreshComments() {
        commentsContainer.innerHTML = '';
        await loadRootComments(1, 10);
    }

    // Инициализация
    refreshComments();

    // Escape при ответе
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !cancelReplyBtn.classList.contains('hidden')) {
            cancelReplyBtn.click();
        }
    });
</script>
</body>
</html>
