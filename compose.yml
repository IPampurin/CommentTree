version: '3.9'

services:
  
  comment-tree:
    build: .
    container_name: comment-tree
    ports:
      - ${SERVICE_PORT}:8081
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 45s
    networks:
      - comment-tree-network

  postgres:
    image: postgres:16
    container_name: ${DB_HOST_NAME:-postgres}
    ports:
      - ${DB_PORT}:5432
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s    
    networks:
      - comment-tree-network

volumes:
  postgres-db:

networks:
  comment-tree-network:
    driver: bridge